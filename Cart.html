<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .item {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    button {
      padding: 8px;
      margin-top: 5px;
      border: none;
      cursor: pointer;
    }

    .remove {
      background: red;
      color: white;
    }

    .whatsapp {
      background: green;
      color: white;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
    }

    .checkout {
      background: black;
      color: white;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Your Cart</h1>

<div id="cart-items"></div>

<h2 id="total">Total: K0</h2>

<button class="whatsapp" onclick="orderWhatsApp()">Order via WhatsApp</button>
<button class="checkout" onclick="goToCheckout()">Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart-items");

let total = 0;

cart.forEach((item, index) => {
  total += item.price;

  let div = document.createElement("div");
  div.classList.add("item");

  div.innerHTML = `
    <p>${item.name} - K${item.price}</p>
    <button class="remove" onclick="removeItem(${index})">Remove</button>
  `;

  container.appendChild(div);
});

document.getElementById("total").innerText = "Total: K" + total;

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}

function goToCheckout() {
  window.location.href = "checkout.html";
}

function orderWhatsApp() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  let message = "🛍 ZAFRE COLLECTION ORDER\n\n";
  let total = 0;

  cart.forEach((item, i) => {
    message += (i+1) + ". " + item.name + " - K" + item.price + "\n";
    total += item.price;
  });

  message += "\nTotal: K" + total;
  message += "\nName: ";
  message += "\nLocation: ";

  let phone = "260772503680";

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</body>
</html>
