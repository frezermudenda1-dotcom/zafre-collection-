<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Your Cart 🛒</h1>

<ul id="cart-items"></ul>

<h2 id="total"></h2>

<h3>Enter your details:</h3>

<input id="name" placeholder="Your Name"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>

<button onclick="goToCheckout()">Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartList = document.getElementById("cart-items");
let total = 0;

// Group items by name
let grouped = {};

cart.forEach(item => {
  if (!grouped[item.name]) {
    grouped[item.name] = { price: item.price, qty: 1 };
  } else {
    grouped[item.name].qty++;
  }
});

// Display items
for (let name in grouped) {
  let item = grouped[name];

  let li = document.createElement("li");

  li.innerHTML = `
    ${name} - K${item.price} 
    <button onclick="decrease('${name}')">➖</button>
    ${item.qty}
    <button onclick="increase('${name}')">➕</button>
    <button onclick="removeItem('${name}')">❌</button>
  `;

  cartList.appendChild(li);

  total += item.price * item.qty;
}

document.getElementById("total").textContent = "Total: K" + total;

// FUNCTIONS
function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}

function increase(name) {
  let item = cart.find(i => i.name === name);
  cart.push(item);
  saveCart();
}

function decrease(name) {
  let index = cart.findIndex(i => i.name === name);
  if (index !== -1) {
    cart.splice(index, 1);
  }
  saveCart();
}

function removeItem(name) {
  cart = cart.filter(i => i.name !== name);
  saveCart();
}

function goToCheckout() {
  window.location.href = "checkout.html";
}

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let message = "New Order:\n";
  let total = 0;

  cart.forEach(item => {
    message += item.name + " - K" + item.price + "\n";
    total += item.price;
  });

  message += "\nTotal: K" + total;
  message += "\n\nCustomer: " + name;
  message += "\nPhone: " + phone;

  let whatsappNumber = "26097XXXXXXX"; // 🔥 PUT YOUR NUMBER HERE

  let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");

  localStorage.removeItem("cart");
}
</script>

</body>
</html>
