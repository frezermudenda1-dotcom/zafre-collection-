<!DOCTYPE html>
<html>
<head>
    <title>Zafre Collection</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Zafre Collection</h1>
    <div class="cart" onclick="goToCart()">🛒 <span id="cart-count">0</span></div>
</header>

<section class="products">

    <div class="product">
        <img src="images (1).jpeg">
        <h2>Street Cap</h2>
        <p>K150</p>
        <button onclick="addToCart('Street Cap',)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images (2).jpeg">
        <h2>White T-Shirt</h2>
        <p>K200</p>
        <button onclick="addToCart('White T-shirt',)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images.jpeg">
        <h2>Black Hoodie</h2>
        <p>K350</p>
        <button onclick="addToCart('Black Hoodie',)">Add to Cart</button>
    </div>

</section>
<div id="popup" class="popup">Added to cart ✅</div>
<script src="script.js"></script>

</body>
</html>
