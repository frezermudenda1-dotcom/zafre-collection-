<!DOCTYPE html>
<html>
<head>
  <title>ZAFRE STORE</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 160px;
      text-align: center;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 8px;
      width: 100%;
      margin-top: 10px;
      border-radius: 5px;
    }

    #cartBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      border-top: 2px solid black;
      padding: 10px;
    }

    #cartItems {
      max-height: 150px;
      overflow-y: auto;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .remove {
      color: red;
      cursor: pointer;
    }

    input {
      width: 95%;
      padding: 8px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2>ZAFRE STORE</h2>
</header>

<div class="products">

  <div class="card">
    <img src="images (2).jpeg">
    <h3>Street Cap</h3>
    <p>K150</p>
    <button onclick="addToCart('Street Cap',150)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images (1).jpeg">
    <h3>White T-Shirt</h3>
    <p>K200</p>
    <button onclick="addToCart('White T-Shirt',200)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="images.jpeg">
    <h3>Black Hoodie</h3>
    <p>K350</p>
    <button onclick="addToCart('Black Hoodie',350)">Add to Cart</button>
  </div>

</div>

<!-- CART + CHECKOUT -->
<div id="cartBox">
  <div id="cartItems"></div>
  <h3 id="total">Total: K0</h3>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">
  <input id="address" placeholder="Delivery Address">

  <button onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function removeItem(i) {
  cart.splice(i, 1);
  updateCart();
}

function updateCart() {
  const items = document.getElementById("cartItems");
  const total = document.getElementById("total");

  items.innerHTML = "";
  let sum = 0;

  cart.forEach((item, i) => {
    sum += item.price;

    items.innerHTML += `
      <div class="item">
        ${item.name} - K${item.price}
        <span class="remove" onclick="removeItem(${i})">✖</span>
      </div>
    `;
  });

  total.innerText = "Total: K" + sum;
}

function orderWhatsApp() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Fill all details");
    return;
  }

  let message = "New Order:%0A";
  cart.forEach(item => {
    message += item.name + " - K" + item.price + "%0A";
  });

  message += "%0ATotal: " + document.getElementById("total").innerText;
  message += "%0AName: " + name;
  message += "%0APhone: " + phone;
  message += "%0AAddress: " + address;

  window.open("https://wa.me/260772503680?text=" + message);
}
</script>

</body>
</html>
